<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeYTM</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      liquidGL — real-refraction WebGL glass for the chrome + queue
      drawer. Vendored from naughtyduk/liquidGL (MIT) so we don't
      depend on a CDN at runtime (Tauri can run offline).

      The snapshot dependency is `html2canvas-pro`, NOT the original
      `html2canvas`. The original (last released 2022) cannot parse
      `oklch()` color functions and crashes on every snapshot in this
      codebase — every CSS variable in the design system uses oklch.
      `html2canvas-pro` is an actively-maintained fork with oklch
      support. It exports a UMD that attaches a namespace at
      `window.html2canvas` instead of the bare function liquidGL
      expects, so the shim below collapses `.default` back onto the
      global before liquidGL evaluates.

      All three load `defer` so they don't block the React mount; the
      useLiquidGL hook polls until both globals are ready.
    -->
    <script src="/scripts/html2canvas.min.js" defer></script>
    <script defer>
      // html2canvas-pro UMD shim. Runs after the previous defer
      // script, before liquidGL's defer script. liquidGL calls
      // `html2canvas(node, opts)` as a bare function, but the UMD
      // sets `window.html2canvas` to `{ default: fn, html2canvas: fn }`.
      // Replace it with the callable default.
      (function () {
        var ns = window.html2canvas;
        if (ns && typeof ns === 'object' && typeof ns.default === 'function') {
          window.html2canvas = ns.default;
        }
      })();
    </script>
    <script src="/scripts/liquidGL.js" defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
